<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Digital Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .clock {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.1));
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .clock:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timezone-label {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 15px;
        }

        .time-display {
            font-size: 3em;
            color: #00ff88;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .date-display {
            font-size: 0.95em;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
        }

        .am-pm {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 5px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        button:active {
            transform: scale(0.95);
        }

        .timezone-input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        #timezoneSelect {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            font-size: 0.95em;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            cursor: pointer;
        }

        #addTimezoneBtn {
            padding: 10px 20px;
        }

        .format-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .format-btn {
            padding: 8px 16px;
            font-size: 0.85em;
        }

        .format-btn.active {
            background: rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
            color: #00ff88;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .time-display {
                font-size: 2em;
            }

            .container {
                padding: 25px;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 World Clock</h1>

        <div class="format-toggle">
            <button class="format-btn active" onclick="toggleFormat('12')">12-Hour</button>
            <button class="format-btn" onclick="toggleFormat('24')">24-Hour</button>
        </div>

        <div class="timezone-input-group">
            <select id="timezoneSelect">
                <option value="">Select a timezone...</option>
            </select>
            <button id="addTimezoneBtn" onclick="addTimezone()">+ Add Timezone</button>
        </div>

        <div class="controls">
            <button onclick="resetClocks()">Reset to Default</button>
            <button onclick="clearAllClocks()">Clear All</button>
        </div>

        <div class="clocks-grid" id="clocksGrid"></div>
    </div>

    <script>
        let timeFormat = '12'; // '12' or '24'
        let timezones = [];

        // Default timezones to display
        const defaultTimezones = [
            { name: 'New York', timezone: 'America/New_York' },
            { name: 'London', timezone: 'Europe/London' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Sydney', timezone: 'Australia/Sydney' },
            { name: 'Dubai', timezone: 'Asia/Dubai' },
            { name: 'Singapore', timezone: 'Asia/Singapore' }
        ];

        // All available timezones
        const allTimezones = [
            // Americas
            { name: 'Los Angeles', timezone: 'America/Los_Angeles' },
            { name: 'Denver', timezone: 'America/Denver' },
            { name: 'Chicago', timezone: 'America/Chicago' },
            { name: 'New York', timezone: 'America/New_York' },
            { name: 'Toronto', timezone: 'America/Toronto' },
            { name: 'Mexico City', timezone: 'America/Mexico_City' },
            { name: 'São Paulo', timezone: 'America/Sao_Paulo' },
            { name: 'Buenos Aires', timezone: 'America/Argentina/Buenos_Aires' },
            
            // Europe
            { name: 'London', timezone: 'Europe/London' },
            { name: 'Paris', timezone: 'Europe/Paris' },
            { name: 'Berlin', timezone: 'Europe/Berlin' },
            { name: 'Moscow', timezone: 'Europe/Moscow' },
            { name: 'Istanbul', timezone: 'Europe/Istanbul' },
            
            // Middle East & Africa
            { name: 'Dubai', timezone: 'Asia/Dubai' },
            { name: 'Cairo', timezone: 'Africa/Cairo' },
            { name: 'Johannesburg', timezone: 'Africa/Johannesburg' },
            
            // Asia
            { name: 'Bangkok', timezone: 'Asia/Bangkok' },
            { name: 'Singapore', timezone: 'Asia/Singapore' },
            { name: 'Hong Kong', timezone: 'Asia/Hong_Kong' },
            { name: 'Shanghai', timezone: 'Asia/Shanghai' },
            { name: 'Tokyo', timezone: 'Asia/Tokyo' },
            { name: 'Seoul', timezone: 'Asia/Seoul' },
            { name: 'Mumbai', timezone: 'Asia/Kolkata' },
            { name: 'Jakarta', timezone: 'Asia/Jakarta' },
            
            // Oceania
            { name: 'Sydney', timezone: 'Australia/Sydney' },
            { name: 'Melbourne', timezone: 'Australia/Melbourne' },
            { name: 'Auckland', timezone: 'Pacific/Auckland' },
            { name: 'Fiji', timezone: 'Pacific/Fiji' }
        ];

        // Initialize
        function init() {
            populateTimezoneSelect();
            timezones = [...defaultTimezones];
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        function populateTimezoneSelect() {
            const select = document.getElementById('timezoneSelect');
            allTimezones.forEach(tz => {
                const option = document.createElement('option');
                option.value = tz.timezone;
                option.textContent = `${tz.name} (${tz.timezone})`;
                select.appendChild(option);
            });
        }

        function addTimezone() {
            const select = document.getElementById('timezoneSelect');
            const selectedValue = select.value;
            
            if (!selectedValue) {
                alert('Please select a timezone');
                return;
            }

            const timezone = allTimezones.find(tz => tz.timezone === selectedValue);
            
            // Check if already added
            if (timezones.some(tz => tz.timezone === selectedValue)) {
                alert('This timezone is already added');
                select.value = '';
                return;
            }

            timezones.push(timezone);
            updateClocks();
            select.value = '';
        }

        function removeTimezone(timezone) {
            timezones = timezones.filter(tz => tz.timezone !== timezone);
            updateClocks();
        }

        function updateClocks() {
            const grid = document.getElementById('clocksGrid');
            grid.innerHTML = '';

            timezones.forEach(tz => {
                const time = new Date().toLocaleString('en-US', {
                    timeZone: tz.timezone,
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: timeFormat === '12'
                });

                const [date, timeStr] = time.split(', ');
                const [timeWithFormat, ampm] = timeStr.split(' ');

                const clockDiv = document.createElement('div');
                clockDiv.className = 'clock';
                clockDiv.innerHTML = `
                    <div class="timezone-name">${tz.name}</div>
                    <div class="timezone-label">${tz.timezone}</div>
                    <div class="time-display">${timeWithFormat}</div>
                    ${timeFormat === '12' ? `<div class="am-pm">${ampm}</div>` : ''}
                    <div class="date-display">${date}</div>
                    <button onclick="removeTimezone('${tz.timezone}')" style="margin-top: 15px; width: 100%;">Remove</button>
                `;
                grid.appendChild(clockDiv);
            });
        }

        function toggleFormat(format) {
            timeFormat = format;
            
            // Update button styles
            document.querySelectorAll('.format-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateClocks();
        }

        function resetClocks() {
            timezones = [...defaultTimezones];
            updateClocks();
        }

        function clearAllClocks() {
            timezones = [];
            updateClocks();
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
